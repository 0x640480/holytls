# Coverage-guided fuzzing of the parsers that consume attacker-controlled bytes
# (url / alt-svc / base64 / Set-Cookie / Content-Encoding / session JSON). Built
# with clang + libFuzzer + ASan/UBSan (the arena poisoning is active too), so a
# crash, OOM (e.g. a decompression bomb), or timeout fails the run and uploads
# the reproducer. Manual + nightly — too heavy for every push; the per-push
# regression is the standalone seed-corpus ctests in ci.yml.
name: Fuzz

on:
  workflow_dispatch:
    inputs:
      seconds:
        description: "Seconds to fuzz each target"
        default: "120"
  schedule:
    - cron: "0 7 * * *" # nightly ~07:00 UTC

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: System packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang ninja-build ccache perl
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-fuzz-${{ github.run_id }}
          restore-keys: ccache-fuzz-
      - name: ccache prep
        run: |
          ccache --max-size=1G
          ccache --zero-stats

      - name: Configure (clang + libFuzzer)
        run: >
          cmake -B build-fuzz -G Ninja
          -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DHOLYTLS_FUZZ=ON -DHOLYTLS_BUILD_TESTS=OFF -DHOLYTLS_BUILD_EXAMPLES=OFF
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build fuzzers
        run: cmake --build build-fuzz

      - name: Fuzz each target
        run: |
          secs="${{ github.event.inputs.seconds || 120 }}"
          fail=0
          for t in url alt_svc base64 cookie decompress persist; do
            echo "::group::fuzz_$t (${secs}s)"
            ./build-fuzz/fuzz_$t fuzz/corpus/$t \
              -max_total_time="$secs" -rss_limit_mb=2048 -timeout=15 \
              -print_final_stats=1 \
              || { echo "::error::fuzz_$t found a crash/timeout/OOM"; fail=1; }
            echo "::endgroup::"
          done
          exit $fail

      - name: Upload reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-reproducers
          path: |
            crash-*
            timeout-*
            oom-*
          if-no-files-found: ignore
