# Build + test gate. Runs the full ctest suite in two configs on every push/PR:
#   - release : -O2 -DNDEBUG production build (no sanitizers).
#   - asan    : Debug + -fsanitize=address,undefined, which also turns on the
#               arena ASan poisoning (intra-arena overflow / use-after-recycle).
# The offline suite runs everywhere; the network-gated live tests skip without
# HOLYTLS_LIVE (so CI stays deterministic). BoringSSL (a bundled dep) is built
# from source with Go + perl; ccache makes that a cache hit on later runs.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release
            build_type: Release
            asan: "OFF"
          - name: asan
            build_type: Debug
            asan: "ON"
    steps:
      - uses: actions/checkout@v4

      # gcc/g++/cmake are preinstalled on the runner; perl + Go build BoringSSL,
      # ninja + ccache speed the from-source dependency build.
      - name: System packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build ccache perl
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false  # no Go modules here — Go only builds BoringSSL

      # ccache turns the heavy dep build (BoringSSL, ngtcp2, nghttp2, ...) into a
      # cache hit after the first run. Fresh key per run; restore the most recent.
      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.name }}-
      - name: ccache prep
        run: |
          ccache --max-size=1G
          ccache --zero-stats

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DHOLYTLS_ASAN=${{ matrix.asan }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build

      - name: ccache stats
        run: ccache --show-stats

      # Offline suite (live tests skip without HOLYTLS_LIVE). ASan/UBSan abort on
      # any finding, which fails the job; the arena poisoning is live in the asan cell.
      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: abort_on_error=1:detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

  # The flat C ABI (capi/) + the Python cffi binding. Builds libholytls_capi (the
  # same heavy dep chain as the C job — ccache, sharing the release cell's cache,
  # makes it a hit), compiles the binding (API-mode cffi cross-checks our cdef
  # against the real header, so this catches capi ABI drift), and runs the offline
  # binding suite. Live binding tests skip without HOLYTLS_LIVE, like the C suite.
  python-binding:
    name: python
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # ninja+ccache+perl+Go build the deps (incl. BoringSSL); the codec dev libs
      # are find_library deps of libholytls_capi (which this job also loads at
      # runtime). Installed explicitly though ubuntu-latest usually ships them.
      - name: System packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build ccache perl zlib1g-dev libbrotli-dev libzstd-dev
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false  # Go only builds BoringSSL here
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-python-${{ github.run_id }}
          restore-keys: |
            ccache-python-
            ccache-release-
      - name: ccache prep
        run: |
          ccache --max-size=1G
          ccache --zero-stats

      # holytls_capi links the holytls static lib, so this builds the full dep
      # chain (BoringSSL/ngtcp2/nghttp2/...) — tests/examples off, we only need
      # the shared library the binding links against.
      - name: Build libholytls_capi
        run: |
          cmake -B build-capi -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DHOLYTLS_BUILD_TESTS=OFF \
            -DHOLYTLS_BUILD_EXAMPLES=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build-capi --target holytls_capi
      - name: ccache stats
        run: ccache --show-stats

      # API mode (out-of-line cffi): compiling the extension #includes the real
      # header and links libholytls_capi, so a binding that drifts from the C ABI
      # fails HERE. Env vars point the builder at the in-tree header + lib (pip's
      # isolated build can't infer the repo root).
      - name: Install binding + test deps
        run: |
          python -m pip install --upgrade pip pytest
          HOLYTLS_CAPI_INCLUDE="$PWD/capi" HOLYTLS_CAPI_LIBDIR="$PWD/build-capi" \
            python -m pip install ./bindings/python

      # Offline suite from the INSTALLED package (live tests skip without
      # HOLYTLS_LIVE), matching the deterministic C job.
      - name: Test
        run: python -m pytest bindings/python/tests -v
